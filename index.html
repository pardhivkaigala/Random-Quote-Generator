<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenQuotes - Random Quote Generator</title>
    <!-- Link to Modular CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Application Header -->
        <header>
            <div class="logo-group">
                <svg class="logo-icon" viewBox="0 0 24 24">
                    <path d="M18.62 18h-5.24l2-4H13V6h8v8c0 2.92-2.38 4-2.38 4zM9.62 18H4.38l2-4H4V6h8v8c0 2.92-2.38 4-2.38 4z"/>
                </svg>
                <span class="logo-text">ZenQuotes</span>
            </div>
            <div class="header-actions">
                <button class="fav-toggle-btn" onclick="toggleSidebar(true)" aria-label="View Favorites">
                    Favorites
                    <span class="badge" id="fav-count">0</span>
                </button>
            </div>
        </header>

        <!-- Category Horizontal Select Bar -->
        <div class="category-scroll-container">
            <div class="category-bar" id="category-bar">
                <button class="category-btn active" onclick="setCategory('All', this)">All</button>
                <button class="category-btn" onclick="setCategory('Motivation', this)">Motivation</button>
                <button class="category-btn" onclick="setCategory('Wisdom', this)">Wisdom</button>
                <button class="category-btn" onclick="setCategory('Creativity', this)">Creativity</button>
                <button class="category-btn" onclick="setCategory('Science', this)">Science</button>
                <button class="category-btn" onclick="setCategory('Philosophy', this)">Philosophy</button>
            </div>
        </div>

        <!-- Glassmorphic Quote Card -->
        <main class="quote-card" id="quote-card">
            <div class="quote-content">
                <span class="tag-indicator" id="quote-category">Wisdom</span>
                <div class="quote-text-wrapper" id="quote-wrapper">
                    <p class="quote-text" id="quote-text">Loading inspiration...</p>
                    <p class="quote-author" id="quote-author"></p>
                </div>
            </div>

            <!-- Card Bottom controls -->
            <div class="quote-controls">
                <div class="action-buttons">
                    <!-- Favorite Icon Button -->
                    <button class="btn-icon" id="fav-btn" onclick="toggleActiveQuoteFavorite()" data-tooltip="Favorite">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </button>
                    <!-- Read Aloud (TTS) Button -->
                    <button class="btn-icon" id="speech-btn" onclick="toggleSpeech()" data-tooltip="Read Aloud">
                        <svg viewBox="0 0 24 24">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </button>
                    <!-- Copy to Clipboard Button -->
                    <button class="btn-icon" onclick="copyQuote()" data-tooltip="Copy Quote">
                        <svg viewBox="0 0 24 24">
                            <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                        </svg>
                    </button>
                    <!-- Share on Twitter Button -->
                    <button class="btn-icon" onclick="shareOnTwitter()" data-tooltip="Share Quote">
                        <svg viewBox="0 0 24 24">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                    </button>
                </div>
                <!-- Main CTA -->
                <button class="btn-primary" onclick="displayNewQuote()">
                    <svg viewBox="0 0 24 24">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    New Quote
                </button>
            </div>
        </main>

        <!-- Dynamic Page Footer -->
        <footer>
            <p>Designed with mindfulness &middot; ZenQuotes &copy; <span id="year">2026</span></p>
        </footer>
    </div>

    <!-- Sliding Favorites Sidebar Drawer -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar(false)"></div>
    <aside class="favorites-sidebar" id="favorites-sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">
                <svg viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
                Your Favorites
            </h2>
            <button class="close-sidebar-btn" onclick="toggleSidebar(false)" aria-label="Close sidebar">
                <svg viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>
        <div class="favorites-list" id="favorites-list"></div>
    </aside>

    <!-- Global Floating Toast Notification -->
    <div class="toast" id="toast">
        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        <span id="toast-message">Copied to clipboard!</span>
    </div>

    <!-- Link to Modular JS -->
    <script src="script.js"></script>
</body>
</html>
